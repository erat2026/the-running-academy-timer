<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RUNNING ACADEMY LIVE TIMER</title>
    <!-- Tailwind CSS (デザイン調整用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (リアルタイム同期用) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <div class="max-w-4xl mx-auto p-4 space-y-4">
        
        <!-- 【最上部】メインヘッダー・タイマー -->
        <header class="bg-white rounded-2xl shadow-sm p-5 border border-slate-200">
            <h1 class="text-center text-xl font-black tracking-wider text-slate-700 mb-3">
                THE RUNNING ACADEMY LIVE TIMER
            </h1>
            
            <!-- 公式タイマー表示 -->
            <div class="text-center p-3 bg-slate-900 text-emerald-400 rounded-xl font-mono text-4xl font-extrabold tracking-widest mb-4" id="masterTimerDisplay">
                00:00.00
            </div>

            <div class="flex flex-wrap gap-2 justify-between items-center border-b border-slate-100 pb-4 mb-4">
                <div class="flex items-center space-x-2">
                    <label class="text-xs font-bold text-slate-500">レース名:</label>
                    <input type="text" id="raceNameInput" class="border-b-2 border-slate-200 font-bold px-1 py-0.5 focus:outline-none focus:border-blue-500" value="練習レース">
                </div>
                <div class="flex space-x-2">
                    <button id="startRaceBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition shadow-sm">🏁 レース開始</button>
                    <button id="downloadCsvBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition shadow-sm">📥 CSV保存</button>
                </div>
            </div>

            <!-- 💬 インカム用リアルタイムメモ欄 -->
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-3">
                <label class="block text-xs font-black text-amber-800 tracking-wide mb-1">📋 保護者間インカム連絡メモ（全員の画面に秒速で同期します）</label>
                <textarea id="roomMemoInput" rows="2" class="w-full p-2 text-sm border rounded-lg bg-white text-slate-700 focus:outline-amber-500 placeholder-slate-400" placeholder="例：「次、〇〇くん行きます」「いま5分休憩です」などインカム代わりに自由に書き込み..."></textarea>
            </div>
        </header>

        <!-- 【中央】計測エリア -->
        <section class="bg-white rounded-2xl shadow-sm p-5 border border-slate-200 space-y-4">
            <div>
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">⏱️ パターンA：選手がハッキリ分かるとき（個別ダイレクト計測）</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-2" id="quickLappersContainer">
                    <!-- 選手ボタンがここに自動で並びます -->
                </div>
            </div>

            <div class="pt-2 border-t border-slate-100">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">⏱️ パターンB：集団で誰だか分からないとき（タイムのみ先押し・連番付与）</h2>
                <button id="triggerUnknownBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded-xl shadow-md text-lg transition transform active:scale-95 flex items-center justify-center space-x-2">
                    <span>⏱️ 誰か不明！タイムのみ連打</span>
                </button>
            </div>
        </section>

        <!-- 【下部】分担管理 ＆ 選手個別記録カード -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <!-- 左側：未割当タイムのプール（一連番号が表示されます） -->
            <div class="md:col-span-1 bg-white rounded-2xl shadow-sm p-4 border border-slate-200 h-fit">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider mb-1">🔍 未割当タイムの処理（連番つき）</h2>
                <p class="text-[11px] text-slate-400 mb-3">※不明ボタンで押された順に#1, #2...と番号がつきます。特定して割り当てると消えます。</p>
                <div id="unknownPoolContainer" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                    <p class="text-slate-400 text-xs italic text-center py-4" id="poolEmptyMsg">未割当のタイムはありません</p>
                </div>
            </div>

            <!-- 右側：選手別の周回カード -->
            <div class="md:col-span-2 bg-white rounded-2xl shadow-sm p-4 border border-slate-200">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider">🏃 選手リストと最新記録</h2>
                    <button id="addAthleteBtn" class="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded-lg font-bold text-slate-600">+ 選手登録</button>
                </div>
                <div id="athletesCardContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- 各選手の周回データと「戻す」ボタンがここに並びます -->
                </div>
            </div>

        </div>

        <!-- データをすべてクリアボタン -->
        <div class="text-right">
            <button id="resetAllBtn" class="text-[11px] text-slate-400 hover:text-red-500 underline transition">データをすべてクリア</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASEの接続設定 ---
        const firebaseConfig = {
          apiKey: "AIzaSyDNjmjkkkm7SEfUnWJ3HPb-T_u3rZsroWc",
          authDomain: "ranning-academy-timer.firebaseapp.com",
          databaseURL: "https://ranning-academy-timer-default-rtdb.firebaseio.com",
          projectId: "ranning-academy-timer",
          storageBucket: "ranning-academy-timer.firebasestorage.app",
          messagingSenderId: "398934670018",
          appId: "1:398934670018:web:645a53f6fa25205ea3595b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let athletes = {};
        let raceStartTime = 0;
        let timerInterval = null;

        // 時間フォーマット変換 (ミリ秒 -> 00:00.00)
        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            const msec = Math.floor((ms % 1000) / 10);
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}.${String(msec).padStart(2, '0')}`;
        }

        // --- 2. リアルタイムデータ同期 ---

        // レース状態（タイマー）の同期
        db.ref('race_status').on('value', snapshot => {
            const data = snapshot.val() || { startTime: 0, raceName: "練習レース" };
            raceStartTime = data.startTime;
            document.getElementById('raceNameInput').value = data.raceName || "練習レース";

            if (raceStartTime > 0) {
                document.getElementById('startRaceBtn').disabled = true;
                document.getElementById('startRaceBtn').classList.add('opacity-40');
                if (!timerInterval) {
                    timerInterval = setInterval(() => {
                        const elapsed = Date.now() - raceStartTime;
                        document.getElementById('masterTimerDisplay').innerText = formatTime(elapsed);
                    }, 30);
                }
            } else {
                document.getElementById('startRaceBtn').disabled = false;
                document.getElementById('startRaceBtn').classList.remove('opacity-40');
                clearInterval(timerInterval);
                timerInterval = null;
                document.getElementById('masterTimerDisplay').innerText = "00:00.00";
            }
        });

        // 💬 インカム連絡メモの同期
        db.ref('room_memo').on('value', snapshot => {
            const memoText = snapshot.val() || "";
            if (document.getElementById('roomMemoInput').value !== memoText) {
                document.getElementById('roomMemoInput').value = memoText;
            }
        });

        // 選手・ラップデータの同期
        db.ref('athletes').on('value', snapshot => {
            athletes = snapshot.val() || {};
            renderAthleteControls();
            renderAthleteCards();
        });

        // 未割当プール（タイム管理）の同期（★一連番号表示に対応）
        db.ref('unknown_pool').on('value', snapshot => {
            const poolData = snapshot.val() || {};
            const container = document.getElementById('unknownPoolContainer');
            const emptyMsg = document.getElementById('poolEmptyMsg');
            
            container.querySelectorAll('.pool-row').forEach(r => r.remove());
            const keys = Object.keys(poolData).sort((a,b) => poolData[a].timestamp - poolData[b].timestamp);

            if (keys.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                keys.forEach(key => {
                    const item = poolData[key];
                    const div = document.createElement('div');
                    div.className = "pool-row bg-amber-50 border border-amber-200 rounded-xl p-2 flex flex-col space-y-2";
                    
                    let optionsHtml = `<option value="">-- 選手を選択 --</option>`;
                    Object.keys(athletes).forEach(aId => {
                        optionsHtml += `<option value="${aId}">${athletes[aId].name}</option>`;
                    });

                    // 表示部分に「#一連番号」を表示
                    div.innerHTML = `
                        <div class="flex justify-between items-center px-1">
                            <span class="bg-amber-200 text-amber-900 font-black text-xs px-2 py-0.5 rounded-md">#${item.sequence || '?'}</span>
                            <span class="font-mono font-bold text-amber-700 text-sm">⏱️ ${formatTime(item.splitTime)}</span>
                        </div>
                        <div class="flex space-x-1">
                            <select id="select_${key}" class="border rounded-lg px-2 py-1 text-xs flex-1 bg-white focus:outline-none">
                                ${optionsHtml}
                            </select>
                            <button onclick="assignPoolTime('${key}', ${item.splitTime})" class="bg-amber-600 hover:bg-amber-700 text-white text-xs px-3 py-1 rounded-lg font-bold">割当</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            }
        });

        // --- 3. 画面の部品作成 ---

        function renderAthleteControls() {
            const container = document.getElementById('quickLappersContainer');
            container.innerHTML = '';
            Object.keys(athletes).forEach(id => {
                const btn = document.createElement('button');
                btn.className = "bg-slate-50 hover:bg-slate-100 text-slate-800 border border-slate-200 font-bold py-3 px-3 rounded-xl text-sm transition transform active:scale-95 flex justify-between items-center";
                btn.onclick = () => triggerAthleteLap(id);
                
                const laps = athletes[id].laps ? Object.keys(athletes[id].laps).length : 0;
                btn.innerHTML = `
                    <span class="truncate">${athletes[id].name}</span>
                    <span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full">${laps}周</span>
                `;
                container.appendChild(btn);
            });
        }

        function renderAthleteCards() {
            const container = document.getElementById('athletesCardContainer');
            container.innerHTML = '';

            Object.keys(athletes).forEach(id => {
                const athlete = athletes[id];
                const lapsArray = athlete.laps ? Object.values(athlete.laps).sort((a,b) => a.lapNumber - b.lapNumber) : [];
                const currentLaps = lapsArray.length;

                const card = document.createElement('div');
                card.className = "bg-slate-50 border border-slate-200 rounded-xl p-3 flex flex-col justify-between";
                
                let latestLapStr = "なし";
                if (currentLaps > 0) {
                    latestLapStr = formatTime(lapsArray[currentLaps - 1].lapTime);
                }

                const rescueBtnHtml = currentLaps > 0 
                    ? `<button onclick="rescueLastLap('${id}')" class="w-full mt-2 bg-white hover:bg-red-50 border border-red-100 text-red-600 font-bold py-1 rounded-lg text-[11px] transition">
                        ↩️ 直近のラップを未割当に戻す
                       </button>`
                    : '';

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-slate-700 truncate">${athlete.name}</span>
                            <span class="text-sm font-mono font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md">${currentLaps} 周</span>
                        </div>
                        <div class="text-[11px] text-slate-500 font-mono">最新ラップ: ${latestLapStr}</div>
                    </div>
                    ${rescueBtnHtml}
                `;
                container.appendChild(card);
            });
        }

        // --- 4. タイム計測・割り当て・戻す処理（コアロジック） ---

        document.getElementById('roomMemoInput').oninput = (e) => {
            db.ref('room_memo').set(e.target.value);
        };

        document.getElementById('startRaceBtn').onclick = () => {
            if (raceStartTime > 0) return;
            db.ref('race_status').set({
                startTime: Date.now(),
                raceName: document.getElementById('raceNameInput').value || "練習レース"
            });
        };

        // パターンB：誰か不明ボタン（★トランザクションで確実に被らない一連番号を計算）
        document.getElementById('triggerUnknownBtn').onclick = () => {
            if (raceStartTime === 0) {
                alert("先に「レース開始」を押してください！");
                return;
            }
            
            const splitTime = Date.now() - raceStartTime;
            const timestamp = Date.now();
            
            // カウンターを安全に進めて番号を取得
            db.ref('pool_counter').runTransaction(currentCount => {
                return (currentCount || 0) + 1;
            }, (error, committed, snapshot) => {
                if (committed) {
                    const nextSequence = snapshot.val();
                    // 取得した連番をつけてプールに保存
                    db.ref('unknown_pool').push({
                        splitTime: splitTime,
                        timestamp: timestamp,
                        sequence: nextSequence
                    });
                }
            });
        };

        // パターンA：個別ボタン
        function triggerAthleteLap(athleteId) {
            if (raceStartTime === 0) {
                alert("レースが開始されていません！");
                return;
            }
            processAthleteLapAssignment(athleteId, Date.now() - raceStartTime);
        }

        function processAthleteLapAssignment(athleteId, splitTime) {
            db.ref(`athletes/${athleteId}`).runTransaction(currentData => {
                if (!currentData) return currentData;
                if (!currentData.laps) currentData.laps = {};
                
                const lapsArray = Object.values(currentData.laps).sort((a,b) => a.lapNumber - b.lapNumber);
                const nextLapNum = lapsArray.length + 1;
                
                let lapTime = splitTime;
                if (lapsArray.length > 0) {
                    lapTime = splitTime - lapsArray[lapsArray.length - 1].splitTime;
                }
                
                const newLapKey = 'lap_' + Date.now() + '_' + Math.floor(Math.random()*1000);
                currentData.laps[newLapKey] = {
                    lapNumber: nextLapNum,
                    lapTime: lapTime,
                    splitTime: splitTime
                };
                return currentData;
            });
        }

        window.assignPoolTime = function(poolKey, splitTime) {
            const athleteId = document.getElementById(`select_${poolKey}`).value;
            if (!athleteId) return alert("選手を選択してください。");
            
            processAthleteLapAssignment(athleteId, splitTime);
            db.ref(`unknown_pool/${poolKey}`).remove();
        };

        window.rescueLastLap = function(athleteId) {
            const athlete = athletes[athleteId];
            if (!athlete || !athlete.laps) return;

            const lapsArray = Object.entries(athlete.laps).sort((a,b) => a[1].lapNumber - b[1].lapNumber);
            if (lapsArray.length === 0) return;

            const [lastLapKey, lastLapValue] = lapsArray[lapsArray.length - 1];
            
            if (confirm(`【割当ミス救済】\n${athlete.name} 選手の直近（${lastLapValue.lapNumber}周目）の記録を消去し、未割当プールにタイムを戻しますか？`)) {
                // 戻すときは連番「戻」としてプールへ
                db.ref('unknown_pool').push({
                    splitTime: lastLapValue.splitTime,
                    timestamp: Date.now(),
                    sequence: "戻"
                }).then(() => {
                    db.ref(`athletes/${athleteId}/laps/${lastLapKey}`).remove();
                });
            }
        };

        // --- 5. 選手追加と全消去設定 ---
        document.getElementById('addAthleteBtn').onclick = () => {
            const name = prompt("選手の名前を入力してください：");
            if (name && name.trim()) {
                db.ref('athletes').push({ name: name.trim(), laps: {} });
            }
        };

        document.getElementById('resetAllBtn').onclick = () => {
            if (confirm("全ての走行データ、連番、インカムメモ、タイマーが初期化されます。よろしいですか？")) {
                db.ref().set({
                    race_status: { startTime: 0, raceName: "練習レース" },
                    room_memo: "",
                    pool_counter: 0,
                    unknown_pool: {},
                    athletes: {}
                });
            }
        };

        // --- 6. 指定ルールにのっとったCSV保存 ---
        document.getElementById('downloadCsvBtn').onclick = () => {
            const raceName = document.getElementById('raceNameInput').value || "レース";
            const now = new Date();
            const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
            const fileName = `${dateStr}_${raceName}_ラップタイム.csv`;

            let csvContent = "\uFEFF選手名,周回数,ラップタイム(区間),スプリットタイム(通算)\n";

            let hasData = false;
            Object.keys(athletes).forEach(id => {
                const athlete = athletes[id];
                if (athlete.laps) {
                    hasData = true;
                    Object.values(athlete.laps).sort((a,b) => a.lapNumber - b.lapNumber).forEach(l => {
                        csvContent += `"${athlete.name}",${l.lapNumber},"${formatTime(l.lapTime)}","${formatTime(l.splitTime)}"\n`;
                    });
                }
            });

            if (!hasData) return alert("保存するラップタイムがまだありません！");

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.setAttribute("href", URL.createObjectURL(blob));
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
