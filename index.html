<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランニングクラブ リアルタイムタイマー</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        .hidden { display: none !important; }
        .room-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .room-tab { padding: 10px 20px; border: 1px solid #ccc; cursor: pointer; border-radius: 4px; }
        .room-tab.active { background-color: #007bff; color: white; font-weight: bold; }
        
        /* ⏱️ ストップウォッチのデザイン */
        .stopwatch-container { text-align: center; background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; color: #333; }
        .stopwatch-display { font-size: 3em; font-family: monospace; font-weight: bold; margin-bottom: 15px; color: #111; }
        .stopwatch-btn { font-size: 1.1em; padding: 10px 20px; margin: 0 5px; cursor: pointer; }
        .btn-start { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-wrap { background-color: #17a2b8; color: white; }
        .btn-reset { background-color: #6c757d; color: white; }

        /* 📋 タイムリストのデザイン */
        .time-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; gap: 10px; }
        .time-info { flex-grow: 1; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .time-str { font-size: 1.3em; font-family: monospace; font-weight: bold; }
        .runner-badge { background-color: #e1f5fe; color: #0288d1; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
        .locked-badge { font-size: 0.8em; color: #ff4d4d; }
        .locked-item { background-color: #f0f0f0; color: #888; }
        .locked-item input { background-color: #e0e0e0; pointer-events: none; }
        
        /* 📝 割り当て入力欄 */
        .runner-input { width: 120px !important; margin: 0 !important; padding: 4px 8px !important; display: inline-block; }
        
        .chat-box { border: 1px solid #ccc; padding: 10px; height: 150px; overflow-y: auto; margin-bottom: 10px; background: #fff; color: #333; }
        .trash-btn { background-color: #ff4d4d; color: white; padding: 2px 8px; border: none; cursor: pointer; border-radius: 4px; margin: 0; }
    </style>
</head>
<body>

    <!-- 🔒 ログイン画面 -->
    <div id="login-screen">
        <h2>🔑 クラブ関係者認証</h2>
        <label>合言葉：</label>
        <input type="password" id="login-pass" placeholder="合言葉を入力">
        <label>お名前（ニックネーム）：</label>
        <input type="text" id="login-name" placeholder="例：佐藤パパ、田中コーチ">
        <button id="login-btn">入室する</button>
        <p id="login-error" style="color: red;"></p>
    </div>

    <!-- ⏱️ メインアプリ画面 -->
    <div id="app-screen" class="hidden">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="welcome-msg">こんにちは</h3>
            <button id="logout-btn" style="padding: 5px 10px;">ログアウト</button>
        </header>

        <!-- 🚪 ルーム切り替えタブ -->
        <div class="room-tabs">
            <div class="room-tab active" data-room="A">ルーム A</div>
            <div class="room-tab" data-room="B">ルーム B</div>
            <div class="room-tab" data-room="C">ルーム C</div>
            <div class="room-tab" data-room="D">ルーム D</div>
            <div class="room-tab" data-room="E">ルーム E</div>
        </div>

        <!-- 📝 ルームごとのメモ欄 -->
        <div style="margin-bottom: 20px;">
            <label>📋 このルームのメモ（気象状況・レース名など）：</label>
            <input type="text" id="room-memo" placeholder="例：2026/07/12 晴れ 追い風1.2m 男子5000m1組目" style="width: 100%;">
        </div>

        <!-- 🏃‍♂️ 組（レース）とCSV操作 -->
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
            <label>現在の「組」:</label>
            <select id="race-group" style="width: 80px; margin: 0;">
                <option value="1">1組</option>
                <option value="2">2組</option>
                <option value="3">3組</option>
                <option value="4">4組</option>
                <option value="5">5組</option>
            </select>
            <button id="download-csv" style="margin: 0;">📊 CSV保存 (Excel用)</button>
        </div>

        <!-- ⏱️ ストップウォッチエリア -->
        <div class="stopwatch-container">
            <div class="stopwatch-display" id="sw-display">00:00.00</div>
            <button class="stopwatch-btn btn-start" id="sw-start-stop">スタート</button>
            <button class="stopwatch-btn btn-wrap" id="sw-wrap">ラップ記録</button>
            <button class="stopwatch-btn btn-reset" id="sw-reset">リセット</button>
        </div>

        <hr>

        <!-- 📋 タイム記録エリア -->
        <div id="timer-section">
            <h4>⏱️ 記録されたタイム一覧</h4>
            <p style="font-size: 0.9em; color: #666;">※タイムの左側をタップすると選択（ロック）でき、右側の入力欄で選手名やゼッケンを割り当てできます。</p>
            <div id="time-list"></div>
        </div>

        <hr>

        <!-- 💬 インカムチャットエリア -->
        <div id="chat-section">
            <h4>💬 現場連絡インカム（リアルタイム）</h4>
            <div id="chat-box" class="chat-box"></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="メッセージを入力..." style="flex-grow: 1; margin: 0;">
                <button id="chat-send" style="margin: 0;">送信</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDKの読み込み -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <script type="module" src="app.js"></script>
</body>
</html>
