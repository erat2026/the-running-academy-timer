<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Running Academy Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>The Running Academy</h1>
        <p>Runners Timer System</p>
    </header>

    <main>
        <!-- メインタイマー部分 -->
        <section class="timer-section">
            <div class="badge">TOTAL TIME</div>
            <div id="main-timer">00:00.00</div>
            <button id="start-btn" class="btn btn-start">一斉スタート</button>
        </section>

        <!-- 選手一覧部分 -->
        <section class="runners-section">
            <h2>選手レコード</h2>
            
            <!-- 選手 A -->
            <div class="runner-card">
                <div class="runner-info">
                    <span class="runner-name">選手 A</span>
                    <button class="btn btn-lap" data-runner="A">ラップ記録</button>
                </div>
                <ul class="lap-list" id="laps-A"></ul>
            </div>

            <!-- 選手 B -->
            <div class="runner-card">
                <div class="runner-info">
                    <span class="runner-name">選手 B</span>
                    <button class="btn btn-lap" data-runner="B">ラップ記録</button>
                </div>
                <ul class="lap-list" id="laps-B"></ul>
            </div>

            <!-- 選手 C -->
            <div class="runner-card">
                <div class="runner-info">
                    <span class="runner-name">選手 C</span>
                    <button class="btn btn-lap" data-runner="C">ラップ記録</button>
                </div>
                <ul class="lap-list" id="laps-C"></ul>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
